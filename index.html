    <script>
      // Pre-paint dark background to avoid a light flash; ThemeProvider takes
      // over (and keeps the theme-color meta in sync) once React mounts.
      try {
        var pref = localStorage.getItem("pb:themePref");
        var dark = pref === "dark" || (pref !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        var bg = dark ? "#161310" : "#FAF9F7";
        document.documentElement.style.background = bg;
        document.querySelector('meta[name="theme-color"]').setAttribute("content", bg);
      } catch (e) { /* default light stays */ }
    </script>
